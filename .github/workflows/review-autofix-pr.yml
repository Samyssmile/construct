name: Review & Auto-Merge

# Reviewt autofix-PRs automatisch:
# 1. Tests + Build parallel zu Claude Code Review
# 2. Merge nur wenn beides grün
# 3. Triggert nächsten autofix-Run falls weitere Issues offen

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number

jobs:
  # ── Resolve PR metadata ──
  resolve:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.meta.outputs.pr_number }}
      head_ref: ${{ steps.meta.outputs.head_ref }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
    steps:
      - name: Get PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefName,headRefOid)
          echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$PR_JSON" | jq -r .headRefName)" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"

  # ── Tests & Build ──
  test:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run tests
        run: npx vitest --run

  # ── Claude Code Review (parallel zu Tests) ──
  review:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      verdict: ${{ steps.analyze.outputs.verdict }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Analyze changes
        id: analyze
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          git diff origin/main...HEAD > "$RUNNER_TEMP/diff.txt"

          cat > "$RUNNER_TEMP/prompt.txt" << 'EOF'
          You are a senior code reviewer for the Construct design system. Read CLAUDE.md first for project conventions.

          Review this PR diff against these criteria. Be pragmatic — approve working code, reject only real problems.

          ## Approve if ALL true:
          - Changes address what the linked issue describes
          - No bugs, regressions, or logic errors
          - No security vulnerabilities (XSS in rendered HTML, injection, etc.)
          - Follows project conventions: ct- prefix, BEM naming, 2-space indent, single quotes, design tokens instead of hardcoded values
          - CSS uses logical properties (inline-start/end, block-start/end) for RTL support where applicable
          - Accessibility: semantic HTML, ARIA attributes present and correct, keyboard navigable
          - Stories use CSF 3 object format with render() and play() functions
          - No hand-edited generated files (tokens.css, tokens.json, tokens.ts)

          ## Reject if ANY true:
          - Changes don't match the issue or are incomplete
          - Introduces bugs, broken tests, or build failures
          - Hardcoded colors/spacing/sizes instead of design tokens
          - Missing or incorrect ARIA attributes on interactive elements
          - Violates code style conventions from CLAUDE.md

          ## Output format
          Your FIRST line MUST be exactly: APPROVED or CHANGES_REQUESTED
          Then write a concise review (max 300 words) explaining your decision.
          For rejections, list specific issues with file paths and line references.

          --- Diff starts here ---
          EOF

          cat "$RUNNER_TEMP/diff.txt" >> "$RUNNER_TEMP/prompt.txt"
          cat "$RUNNER_TEMP/prompt.txt" | claude -p > "$RUNNER_TEMP/review.txt"

          VERDICT=$(head -1 "$RUNNER_TEMP/review.txt")
          if [[ "$VERDICT" != "APPROVED" && "$VERDICT" != "CHANGES_REQUESTED" ]]; then
            VERDICT="CHANGES_REQUESTED"
          fi
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          VERDICT: ${{ steps.analyze.outputs.verdict }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.RUNNER_TEMP + '/review.txt', 'utf8');
            const approved = process.env.VERDICT === 'APPROVED';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `### ${approved ? 'Approved' : 'Changes Requested'} — Claude Code Review\n\n${body}`
            });

      - name: Label issue on rejection
        if: steps.analyze.outputs.verdict == 'CHANGES_REQUESTED'
        uses: actions/github-script@v7
        env:
          HEAD_REF: ${{ needs.resolve.outputs.head_ref }}
        with:
          script: |
            const branch = process.env.HEAD_REF;
            const match = branch.match(/autofix\/issue-(\d+)/);
            if (!match) return;

            const num = Number(match[1]);
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              name: 'autofix-pr-created'
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              labels: ['autofix-review-failed']
            });

  # ── Merge (nur wenn Tests + Review bestanden) ──
  merge:
    needs: [resolve, test, review]
    if: needs.review.outputs.verdict == 'APPROVED'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Squash-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ needs.resolve.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch

      - name: Trigger next autofix run
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'autofix',
              per_page: 1
            });

            if (issues.length > 0) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'auto-fix-issues.yml',
                ref: 'main'
              });
              core.notice('More autofix issues remain — triggered next fix run.');
            }

  # ── Fehlerbehandlung wenn Tests oder Review fehlschlagen ──
  handle-failure:
    needs: [resolve, test, review]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment and label
        uses: actions/github-script@v7
        env:
          TEST_RESULT: ${{ needs.test.result }}
          REVIEW_RESULT: ${{ needs.review.result }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          HEAD_REF: ${{ needs.resolve.outputs.head_ref }}
        with:
          script: |
            const testFailed = process.env.TEST_RESULT === 'failure';
            const reviewFailed = process.env.REVIEW_RESULT === 'failure';

            let msg = 'Auto-merge blocked:\n';
            if (testFailed) msg += '- Tests failed\n';
            if (reviewFailed) msg += '- Review process failed\n';
            msg += '\nThis PR needs manual attention.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: msg
            });

            // Label the linked issue
            const branch = process.env.HEAD_REF;
            const match = branch.match(/autofix\/issue-(\d+)/);
            if (match) {
              const num = Number(match[1]);
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                name: 'autofix-pr-created'
              }).catch(() => {});
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                labels: ['autofix-review-failed']
              });
            }
