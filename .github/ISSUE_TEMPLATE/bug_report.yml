name: 🐛 Bug Report
description: Report a problem with a component, token, or style
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the sections below.
  - type: input
    id: component
    attributes:
      label: Component / Area
      description: Which component or token is affected?
      placeholder: e.g. ct-button, datepicker, color tokens
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal HTML/CSS or a link (CodeSandbox/StackBlitz) that reproduces the issue.
      placeholder: |
        1. Use markup '...'
        2. Apply theme '...'
        3. See '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. Actual
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      description: Does it happen in a specific theme?
      options:
        - light
        - dark
        - high-contrast
        - all themes
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "@neuravision/construct@2.0.4"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser / OS
      placeholder: "Chrome 130 on Windows 11"
    validations:
      required: false
  - type: checkboxes
    id: a11y
    attributes:
      label: Accessibility
      options:
        - label: This bug affects accessibility (keyboard, screen reader, contrast)
